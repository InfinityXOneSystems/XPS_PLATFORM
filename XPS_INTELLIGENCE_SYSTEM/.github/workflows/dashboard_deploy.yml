name: 🎛️ Dashboard Deploy (Next.js → Vercel)

# Vercel deployment pipeline for the XPS Intelligence Dashboard (Next.js).
#
# This is the FULL-FEATURED DASHBOARD at dashboard/ — 13 pages:
#   Chat, Leads, CRM, Analytics, Vision Cortex, Invention Lab, Trends,
#   Guardian, Workspace, Studio, Connectors, Settings, Admin
#
# ⚠️  DO NOT CONFUSE with frontend/ (Vite+React 4-tab control panel, see frontend_deploy.yml)
#
# Deployment targets:
#   main    branch → Vercel production (xps-intelligence-dashboard.vercel.app)
#   develop branch → Vercel preview URL
#   staging branch → Vercel pre-production alias
#
# Required secrets:
#   VERCEL_ORG_ID              — Vercel team/org ID
#   VERCEL_DASHBOARD_PROJECT_ID — Vercel project ID for the dashboard (separate from frontend/)

on:
  push:
    branches: [main, develop, staging]
    paths:
      - 'dashboard/**'
      - 'leads/**'
      - 'data/**'
      - '.github/workflows/dashboard_deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'preview'
        type: choice
        options: [preview, production]

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: dashboard-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DASHBOARD_PROJECT_ID }}
  RAILWAY_BACKEND: https://xps-intelligence.up.railway.app

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Build
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: 🔨 Build Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Sync latest lead data into static assets
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p dashboard/public/data
          if [ -f leads/scored_leads.json ]; then
            cp leads/scored_leads.json dashboard/public/data/scored_leads.json
            echo "✅ Synced $(python3 -c "import json; d=json.load(open('leads/scored_leads.json')); print(len(d))") leads → dashboard/public/data/scored_leads.json"
          fi
          if [ -f leads/scoring_report.json ]; then
            cp leads/scoring_report.json dashboard/public/data/scoring_report.json
            echo "✅ Synced scoring_report.json"
          fi
          if [ -f pages/data/scored_leads.json ]; then
            cp pages/data/scored_leads.json dashboard/public/data/scored_leads.json
            echo "✅ Overriding with pages/data/scored_leads.json (may be newer)"
          fi

      - name: Build Next.js (static export)
        env:
          NEXT_PUBLIC_API_URL: ${{ env.RAILWAY_BACKEND }}
          NEXT_PUBLIC_GATEWAY_URL: ${{ env.RAILWAY_BACKEND }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-out
          path: dashboard/out
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Deploy to Vercel
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'preview' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ github.ref_name == 'main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: dashboard

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            URL=$(vercel --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          else
            URL=$(vercel --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          fi
          echo "deploy_url=$URL" >> "$GITHUB_OUTPUT"
          echo "🎛️ Dashboard deployed to: $URL"
        working-directory: dashboard

      - name: Smoke test deployed URL
        run: |
          URL="${{ steps.deploy.outputs.deploy_url }}"
          if [ -z "$URL" ]; then
            echo "⚠️  No deploy URL captured — skipping smoke test"
            exit 0
          fi
          echo "Testing $URL ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Dashboard responded HTTP 200"
              exit 0
            fi
            echo "  attempt $i: HTTP $STATUS — waiting 10s"
            sleep 10
          done
          echo "⚠️  Dashboard did not return 200 after 5 attempts"
          exit 1

      - name: Comment deploy URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎛️ **Dashboard Preview:** ${{ steps.deploy.outputs.deploy_url }}`
            })
