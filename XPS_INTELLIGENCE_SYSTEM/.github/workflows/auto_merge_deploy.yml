name: 🔀 Auto-Merge & Deploy to Railway

# GOVERNANCE: Tier 2 — Merge + Deployment
#
# Merges a pull request into main and immediately triggers the Railway deploy.
# Uses Infinity Orchestrator GitHub App (ID 2494652) when GH_APP_PRIVATE_KEY
# secret is set.  Falls back to GITHUB_TOKEN (which can also merge PRs when
# branch protection allows it via Actions).
#
# Triggers:
#   - workflow_dispatch  — manual: provide PR number
#   - repository_dispatch type "auto_merge" — payload: { pr_number }
#
# Required secret (for cross-repo operations):
#   GH_APP_PRIVATE_KEY   — RSA private key of the Infinity Orchestrator App
#                          (App ID 2494652 is hardcoded; no GH_APP_ID secret needed)
#
# See: docs/INFINITY_ORCHESTRATOR_SETUP.md for setup instructions.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to merge"
        required: true
        default: "172"
        type: string
      merge_method:
        description: "Merge strategy"
        required: false
        default: "squash"
        type: choice
        options:
          - squash
          - merge
          - rebase
      deploy_after_merge:
        description: "Trigger Railway deploy after merge"
        required: false
        default: "true"
        type: boolean
  repository_dispatch:
    types: [auto_merge]

concurrency:
  group: auto-merge-${{ github.event.inputs.pr_number || github.event.client_payload.pr_number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  merge-and-deploy:
    name: 🔀 Merge PR & 🚂 Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Resolve PR number ─────────────────────────────────────────────
      - name: Resolve inputs
        id: inputs
        run: |
          PR="${{ github.event.inputs.pr_number || github.event.client_payload.pr_number || '172' }}"
          METHOD="${{ github.event.inputs.merge_method || github.event.client_payload.merge_method || 'squash' }}"
          DEPLOY="${{ github.event.inputs.deploy_after_merge || github.event.client_payload.deploy_after_merge || 'true' }}"
          echo "pr=$PR"       >> $GITHUB_OUTPUT
          echo "method=$METHOD" >> $GITHUB_OUTPUT
          echo "deploy=$DEPLOY" >> $GITHUB_OUTPUT
          echo "Merging PR #${PR} via ${METHOD}"

      # ── 2. Mint Infinity Orchestrator App token ──────────────────────────
      - name: Generate Infinity Orchestrator App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: "2494652"  # Infinity Orchestrator App (hardcoded)
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
        continue-on-error: true

      - name: Resolve auth token
        id: token
        run: |
          if [ -n "${{ steps.app-token.outputs.token }}" ]; then
            echo "token=${{ steps.app-token.outputs.token }}" >> $GITHUB_OUTPUT
            echo "source=infinity_orchestrator_app" >> $GITHUB_OUTPUT
            echo "✅ Using Infinity Orchestrator GitHub App token"
          else
            echo "token=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_OUTPUT
            echo "source=github_token" >> $GITHUB_OUTPUT
            echo "⚠️  Using GITHUB_TOKEN (add GH_APP_PRIVATE_KEY for cross-repo access)"
          fi

      # ── 3. Checkout (needed for gh CLI) ─────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.token.outputs.token }}
          fetch-depth: 0

      # ── 4. Validate PR ───────────────────────────────────────────────────
      - name: Validate PR is open and mergeable
        id: pr-check
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          PR="${{ steps.inputs.outputs.pr }}"
          STATE=$(gh pr view "$PR" --repo "${{ github.repository }}" \
                  --json state,mergeable,isDraft,title \
                  --jq '{state:.state, mergeable:.mergeable, isDraft:.isDraft, title:.title}')
          echo "PR #$PR state: $STATE"

          IS_OPEN=$(echo "$STATE"  | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('state',''))")
          IS_DRAFT=$(echo "$STATE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('isDraft',''))")
          PR_TITLE=$(echo "$STATE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('title','PR #${PR}'))")

          echo "pr_title=${PR_TITLE}" >> $GITHUB_OUTPUT

          if [ "$IS_OPEN" != "OPEN" ]; then
            echo "❌ PR #$PR is not open (state: $IS_OPEN) — it may already be merged."
            echo "already_merged=true" >> $GITHUB_OUTPUT
          else
            echo "mergeable=true" >> $GITHUB_OUTPUT
            echo "already_merged=false" >> $GITHUB_OUTPUT
          fi

          # Un-draft if needed
          if [ "$IS_DRAFT" = "True" ]; then
            echo "Converting draft PR #$PR to ready for review..."
            gh pr ready "$PR" --repo "${{ github.repository }}" || true
          fi

      # ── 5. Run tests before merge ────────────────────────────────────────
      - name: Setup Node.js
        if: steps.pr-check.outputs.already_merged != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        if: steps.pr-check.outputs.already_merged != 'true'
        run: npm ci

      - name: Run test suite
        if: steps.pr-check.outputs.already_merged != 'true'
        id: tests
        run: |
          npm test 2>&1 | tee /tmp/test_output.txt
          TEST_COUNT=$(grep -E "^ℹ tests" /tmp/test_output.txt | awk '{print $NF}' || echo "?")
          PASS_COUNT=$(grep -E "^ℹ pass"  /tmp/test_output.txt | awk '{print $NF}' || echo "?")
          FAIL_COUNT=$(grep -E "^ℹ fail"  /tmp/test_output.txt | awk '{print $NF}' || echo "0")
          echo "test_count=$TEST_COUNT" >> $GITHUB_OUTPUT
          echo "pass_count=$PASS_COUNT" >> $GITHUB_OUTPUT
          echo "fail_count=$FAIL_COUNT" >> $GITHUB_OUTPUT
          if [ "${FAIL_COUNT}" != "0" ] && [ "${FAIL_COUNT}" != "?" ]; then
            echo "❌ ${FAIL_COUNT} test(s) failed — aborting merge"
            exit 1
          fi
          echo "✅ All ${PASS_COUNT}/${TEST_COUNT} tests passed"

      # ── 6. Merge the PR ──────────────────────────────────────────────────
      - name: Merge PR #${{ steps.inputs.outputs.pr }}
        if: steps.pr-check.outputs.already_merged != 'true'
        id: merge
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          PR="${{ steps.inputs.outputs.pr }}"
          METHOD="${{ steps.inputs.outputs.method }}"
          REPO="${{ github.repository }}"

          echo "Merging PR #$PR into main (method: $METHOD)..."

          # Write merge body using printf (avoids YAML heredoc parsing issues)
          PR_TITLE="${{ steps.pr-check.outputs.pr_title }}"
          PASS="${{ steps.tests.outputs.pass_count }}"
          TOTAL="${{ steps.tests.outputs.test_count }}"
          printf "Auto-merged by Infinity Orchestrator.\n\n%s/%s tests passed.\n" \
            "${PASS:-all}" "${TOTAL:-}" > /tmp/merge_body.txt

          gh pr merge "$PR" \
            --repo "$REPO" \
            --"$METHOD" \
            --subject "Merge PR #${PR}: ${PR_TITLE}" \
            --body-file /tmp/merge_body.txt \
            --delete-branch 2>&1 || {
              echo "⚠️  Branch delete failed (may not exist) — merge may still have succeeded"
            }

          echo "✅ PR #$PR merged into main"
          echo "merged=true" >> $GITHUB_OUTPUT

      - name: Confirm already merged
        if: steps.pr-check.outputs.already_merged == 'true'
        run: |
          echo "ℹ️  PR #${{ steps.inputs.outputs.pr }} was already merged — proceeding to deploy"

      # ── 7. Trigger Railway deploy ─────────────────────────────────────────
      - name: Trigger Railway deploy workflow
        if: steps.inputs.outputs.deploy == 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          echo "Triggering deploy-railway.yml on main branch..."
          gh workflow run deploy-railway.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            --field skip_tests=true \
            2>&1 && echo "✅ Railway deploy workflow triggered" || \
            echo "⚠️  Could not dispatch deploy workflow — it will auto-trigger on the push to main"

      # ── 8. Write summary ──────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        env:
          AUTH_SOURCE: ${{ steps.token.outputs.source }}
          PR_TITLE: ${{ steps.pr-check.outputs.pr_title }}
        run: |
          PR="${{ steps.inputs.outputs.pr }}"
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          AUTH="${AUTH_SOURCE:-unknown}"
          TITLE="${PR_TITLE:-PR #${PR}}"
          TESTS_PASS="${{ steps.tests.outputs.pass_count }}"
          TESTS_TOTAL="${{ steps.tests.outputs.test_count }}"

          {
            echo "# 🔀 Auto-Merge & Deploy Summary"
            echo ""
            echo "**Timestamp:** ${TS}"
            echo "**PR:** #${PR} — ${TITLE}"
            echo "**Auth:** ${AUTH}"
            echo "**Repo:** ${{ github.repository }}"
            echo ""
            echo "## Steps"
            echo "| Step | Status |"
            echo "|------|--------|"
            echo "| Validate PR | ${{ steps.pr-check.outcome }} |"
            echo "| Run tests (${TESTS_PASS}/${TESTS_TOTAL}) | ${{ steps.tests.outcome }} |"
            echo "| Merge PR | ${{ steps.merge.outcome }} |"
            echo ""
            echo "## Next"
            echo "The \`deploy-railway.yml\` workflow will trigger automatically on the push to main,"
            echo "building the Docker image and deploying to Railway us-east4."
            echo ""
            echo "**Railway URL:** https://xps-intelligence.up.railway.app"
          } >> "$GITHUB_STEP_SUMMARY"
