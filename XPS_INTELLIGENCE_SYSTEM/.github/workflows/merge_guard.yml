name: Merge Conflict Guard

# Prevents merge conflicts by detecting them on PRs early.
# If conflicts are found, the Autonomous Conflict Resolver workflow is triggered
# automatically — zero human intervention required.
# See: .github/workflows/auto_conflict_resolver.yml

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write      # write needed to push auto-resolutions
  pull-requests: write
  issues: write
  actions: write

jobs:
  conflict-check:
    name: Detect Merge Conflicts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout base branch (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python (for autonomous resolver)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch PR branch
        run: |
          git fetch origin ${{ github.event.pull_request.head.ref }} || true
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-head || true

      - name: Check for merge conflicts
        id: conflict
        run: |
          # Try a test merge without committing
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CONFLICT=false
          CONFLICT_FILES=""

          if git merge --no-commit --no-ff pr-head 2>&1; then
            echo "conflict=false" >> $GITHUB_OUTPUT
            git merge --abort 2>/dev/null || true
          else
            CONFLICT=true
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "unknown")
            echo "conflict=true"  >> $GITHUB_OUTPUT
            echo "conflict_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CONFLICT_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            git merge --abort 2>/dev/null || true
          fi

          echo "Conflict detected: $CONFLICT"
          if [ -n "$CONFLICT_FILES" ]; then
            echo "Conflicting files:"
            echo "$CONFLICT_FILES"
          fi

      - name: Post conflict report comment
        uses: actions/github-script@v7
        with:
          script: |
            const conflict = '${{ steps.conflict.outputs.conflict }}' === 'true';
            const conflictFiles = `${{ steps.conflict.outputs.conflict_files }}`.trim();

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Merge Conflict Guard')
            );

            const body = conflict
              ? [
                  '## ⚠️ Merge Conflict Guard — Conflicts Detected → Auto-Resolving',
                  '',
                  'Merge conflicts were found with `main`. **The Autonomous Conflict Resolver is resolving them now — zero humans needed.**',
                  '',
                  '### Conflicting Files',
                  '```',
                  conflictFiles || '(see workflow logs for details)',
                  '```',
                  '',
                  '### Resolution in progress',
                  '> The `auto_conflict_resolver` workflow will commit resolved files to this branch automatically.',
                  '> No manual rebasing required.',
                  '',
                  '_Automated resolution by Merge Conflict Guard + Autonomous Resolver_',
                ].join('\n')
              : [
                  '## ✅ Merge Conflict Guard — No Conflicts',
                  '',
                  'This PR merges cleanly with `main`. No conflicts detected.',
                  '',
                  '_Automated check by Merge Conflict Guard_',
                ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Auto-resolve conflicts (then re-verify)
        if: steps.conflict.outputs.conflict == 'true'
        run: |
          echo "⚙️ Conflicts detected — triggering autonomous resolution..."

          # Check out the PR branch for writing
          git fetch origin ${{ github.event.pull_request.head.ref }}
          git checkout ${{ github.event.pull_request.head.ref }}
          git config user.name  "xps-conflict-resolver[bot]"
          git config user.email "xps-conflict-resolver[bot]@users.noreply.github.com"

          # Run the autonomous resolver
          RESOLVER_EXIT=0
          python scripts/auto_resolve_conflicts.py --repo-root . || RESOLVER_EXIT=$?
          echo "Resolver exit code: $RESOLVER_EXIT"

          # Fail fast on unexpected resolver crash (not 0=success, not 1=conflicts-remain)
          if [ "$RESOLVER_EXIT" -ne 0 ] && [ "$RESOLVER_EXIT" -ne 1 ]; then
            echo "::error::Conflict resolver crashed with exit code $RESOLVER_EXIT"
            exit "$RESOLVER_EXIT"
          fi

          # Commit and push if anything changed
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "fix: auto-resolve merge conflicts [merge-guard-bot] [skip ci]"
            for attempt in 1 2 3; do
              git push origin HEAD:${{ github.event.pull_request.head.ref }} && break || {
                echo "Push attempt $attempt failed — retrying..."
                git pull --rebase origin ${{ github.event.pull_request.head.ref }} || true
                sleep $((attempt * 5))
              }
            done
            echo "✅ Conflicts resolved and pushed autonomously."
          else
            echo "No file changes after resolver ran."
          fi

          # Re-check if conflicts remain
          REMAINING=$(grep -rl "^<<<<<<< " . \
            --include="*.py" --include="*.js" --include="*.ts" \
            --include="*.json" --include="*.yml" --include="*.yaml" \
            --include="*.md" --include="*.txt" --include="*.sh" \
            2>/dev/null | grep -v "\.git/" | grep -v "node_modules/" || true)

          if [ -n "$REMAINING" ]; then
            echo "::warning::Some conflicts could not be auto-resolved. Files: $REMAINING"
            echo "These will be handled by the Autonomous Conflict Resolver workflow."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Only fail if conflicts are truly unresolvable
        if: steps.conflict.outputs.conflict == 'true'
        id: post_resolve_check
        run: |
          # Re-check after attempted resolution
          REMAINING=$(grep -rl "^<<<<<<< " . \
            --include="*.py" --include="*.js" --include="*.ts" \
            --include="*.json" --include="*.yml" --include="*.yaml" \
            --include="*.md" --include="*.txt" --include="*.sh" \
            2>/dev/null | grep -v "\.git/" | grep -v "node_modules/" || true)

          if [ -n "$REMAINING" ]; then
            echo "::error::Unresolvable merge conflicts remain: $REMAINING"
            echo "The Autonomous Conflict Resolver workflow will attempt further resolution."
            echo "Files:"
            echo "$REMAINING"
            echo "all_resolved=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ All conflicts were resolved autonomously — no human intervention required."
            echo "all_resolved=true" >> $GITHUB_OUTPUT
          fi

      - name: Auto-merge PR after conflict resolution
        if: steps.post_resolve_check.outputs.all_resolved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          if [ -z "$PR" ]; then
            echo "ℹ️  Not a pull_request event — skipping auto-merge."
            exit 0
          fi

          STATE=$(gh pr view "$PR" --repo "$REPO" \
            --json state,isDraft,mergeable \
            --jq '{state:.state,isDraft:.isDraft,mergeable:.mergeable}')

          IS_OPEN=$(echo "$STATE"  | python3 -c "import sys,json; print(json.load(sys.stdin).get('state',''))")
          IS_DRAFT=$(echo "$STATE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('isDraft',''))")

          if [ "$IS_OPEN" != "OPEN" ]; then
            echo "ℹ️  PR #$PR is not open (state: $IS_OPEN) — nothing to merge."
            exit 0
          fi

          if [ "$IS_DRAFT" = "True" ]; then
            echo "Converting draft PR to ready for review..."
            gh pr ready "$PR" --repo "$REPO" || true
          fi

          echo "🔀 Auto-merging PR #$PR after successful conflict resolution..."
          printf "Auto-merged by Merge Guard after autonomous conflict resolution.\n" \
            > /tmp/mg_merge_body.txt

          gh pr merge "$PR" \
            --repo "$REPO" \
            --squash \
            --subject "Merge PR #${PR}: conflicts auto-resolved and merged" \
            --body-file /tmp/mg_merge_body.txt \
            --delete-branch 2>&1 || {
              FINAL_STATE=$(gh pr view "$PR" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
              if [ "$FINAL_STATE" = "MERGED" ]; then
                echo "✅ PR #$PR is confirmed merged."
              else
                echo "⚠️  Auto-merge returned non-zero but merge may have partially succeeded (state: $FINAL_STATE)."
              fi
            }

          echo "✅ Auto-merge complete for PR #$PR."

      - name: Auto-merge PR when no conflicts were found
        if: steps.conflict.outputs.conflict != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          if [ -z "$PR" ]; then
            echo "ℹ️  Not a pull_request event — skipping auto-merge."
            exit 0
          fi

          STATE=$(gh pr view "$PR" --repo "$REPO" \
            --json state,isDraft,mergeable \
            --jq '{state:.state,isDraft:.isDraft,mergeable:.mergeable}')

          IS_OPEN=$(echo "$STATE"  | python3 -c "import sys,json; print(json.load(sys.stdin).get('state',''))")
          IS_DRAFT=$(echo "$STATE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('isDraft',''))")
          MERGEABLE=$(echo "$STATE"| python3 -c "import sys,json; print(json.load(sys.stdin).get('mergeable',''))")

          if [ "$IS_OPEN" != "OPEN" ]; then
            echo "ℹ️  PR #$PR is not open (state: $IS_OPEN) — nothing to merge."
            exit 0
          fi

          if [ "$MERGEABLE" = "CONFLICTING" ]; then
            echo "⚠️  GitHub still reports PR #$PR as conflicting — skipping auto-merge."
            exit 0
          fi

          if [ "$IS_DRAFT" = "True" ]; then
            gh pr ready "$PR" --repo "$REPO" || true
          fi

          echo "🔀 PR #$PR is conflict-free — auto-merging..."
          printf "Auto-merged by Merge Guard (no conflicts detected).\n" \
            > /tmp/mg_clean_merge_body.txt

          gh pr merge "$PR" \
            --repo "$REPO" \
            --squash \
            --subject "Merge PR #${PR}: auto-merged (no conflicts)" \
            --body-file /tmp/mg_clean_merge_body.txt \
            --delete-branch 2>&1 || {
              FINAL_STATE=$(gh pr view "$PR" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
              echo "Merge result state: $FINAL_STATE"
            }

          echo "✅ Auto-merge complete for PR #$PR."

  # ── Stale branch warning ──────────────────────────────────────────────────
  stale-branch-check:
    name: Stale Branch Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if PR branch is behind main
        id: stale
        run: |
          git fetch origin main
          BASE_SHA=$(git rev-parse origin/main)
          HEAD_SHA=$(git rev-parse HEAD)
          BEHIND=$(git rev-list --count HEAD..origin/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "PR branch is $BEHIND commit(s) behind main"

      - name: Post stale warning if significantly behind
        if: ${{ fromJSON(steps.stale.outputs.behind) > 10 }}
        uses: actions/github-script@v7
        with:
          script: |
            const behind = parseInt('${{ steps.stale.outputs.behind }}');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Stale Branch Warning')
            );
            if (existing) return;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `## ⚠️ Stale Branch Warning`,
                '',
                `This PR branch is **${behind} commits behind \`main\`**. Consider rebasing to get the latest changes and reduce merge conflict risk.`,
                '',
                '```bash',
                'git fetch origin main',
                'git rebase origin/main',
                'git push --force-with-lease',
                '```',
                '',
                '_Automated check by Merge Conflict Guard_',
              ].join('\n'),
            });
