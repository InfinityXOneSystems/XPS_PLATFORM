name: Port St Lucie Lead Scraper

# Dedicated shadow scraper for Port St Lucie, FL
# Runs daily and on-demand.  Uses ShadowRestScraper (no API keys required).

on:
  schedule:
    - cron: '0 8 * * *'        # 08:00 UTC daily
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Comma-separated keywords (leave blank for all defaults)'
        required: false
        default: ''
      max_per_keyword:
        description: 'Max leads per keyword'
        required: false
        default: '25'
      dry_run:
        description: 'Dry run (1 = scrape but do not commit)'
        required: false
        default: '0'

concurrency:
  group: psl-scraper
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape-psl:
    name: "Scrape Port St Lucie, FL"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install httpx==0.27.0 beautifulsoup4==4.14.3 --quiet

      - name: Run Port St Lucie shadow scraper
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            ARGS="--keywords ${{ github.event.inputs.keywords }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "1" ]; then
            ARGS="$ARGS --dry-run"
          fi
          MAX="${{ github.event.inputs.max_per_keyword }}"
          if [ -z "$MAX" ]; then MAX=25; fi
          python scripts/scrape_port_st_lucie.py $ARGS --max-per-keyword "$MAX"

      # YAML multiline indentation note (110% Protocol):
      # All lines inside a `run: |` literal block scalar MUST be indented at
      # least as far as the first content line (here: 12 spaces / 6 levels of
      # 2-space YAML indent).  This applies even to embedded multi-line strings
      # passed to interpreters (e.g. `python3 -c "..."`).  YAML strips the
      # block indentation when building the string value, so Python receives
      # the code without leading whitespace — no IndentationError occurs.
      - name: Show PSL lead count
        # YAML block scalar note: all lines in a run: | block must be indented
        # at least as much as the first content line (12 spaces here). YAML
        # strips that indentation when building the string, so the shell and
        # Python runtime receive clean zero-indented code.
        run: |
          if [ -f leads/port_st_lucie_leads.json ]; then
            COUNT=$(python3 -c "import json; d=json.load(open('leads/port_st_lucie_leads.json')); print(len(d))" 2>/dev/null || echo 0)
            echo "✅ Port St Lucie leads: $COUNT"
            python3 -c "
          import json
          leads = json.load(open('leads/port_st_lucie_leads.json'))
          hot  = sum(1 for l in leads if l.get('tier') == 'HOT')
          warm = sum(1 for l in leads if l.get('tier') == 'WARM')
          cold = sum(1 for l in leads if l.get('tier') == 'COLD')
          print(f'  HOT: {hot}  WARM: {warm}  COLD: {cold}')
          print()
          for l in leads[:5]:
              print(f'  {l[\"company\"]} | {l[\"phone\"]} | {l[\"city\"]}, {l[\"state\"]} | {l.get(\"website\",\"\")}')
          "
          fi

      - name: Commit scraped leads
        if: github.event.inputs.dry_run != '1'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leads/ pages/data/ data/leads/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new leads to commit."
          else
            LEAD_COUNT=$(python3 -c "import json; d=json.load(open('leads/port_st_lucie_leads.json')); print(len(d))" 2>/dev/null || echo "?")
            git commit -m "data(psl): scrape ${LEAD_COUNT} real Port St Lucie FL leads — $(date -u '+%Y-%m-%d %H:%M') UTC [skip ci]"
            for attempt in 1 2 3; do
              git push && break || {
                echo "Push attempt $attempt failed — syncing..."
                git fetch origin main
                git merge -X ours --no-edit origin/main 2>/dev/null || true
                sleep $((attempt * 5))
              }
            done
          fi

      # YAML block scalar note: all lines must be indented ≥ 10 spaces (the
      # block level). YAML strips those 10 spaces before passing the string to
      # bash, so the shell and Python heredoc terminator arrive at column 0.
      - name: Write job summary
        run: |
          echo "## Port St Lucie, FL — Lead Scrape Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f leads/port_st_lucie_leads.json ]; then
            python3 - << 'PYEOF'
          import json, os
          leads = json.load(open("leads/port_st_lucie_leads.json"))
          hot  = sum(1 for l in leads if l.get("tier") == "HOT")
          warm = sum(1 for l in leads if l.get("tier") == "WARM")
          cold = sum(1 for l in leads if l.get("tier") == "COLD")

          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as f:
              f.write(f"| Metric | Value |\n")
              f.write(f"|--------|-------|\n")
              f.write(f"| Total leads | {len(leads)} |\n")
              f.write(f"| HOT | {hot} |\n")
              f.write(f"| WARM | {warm} |\n")
              f.write(f"| COLD | {cold} |\n")
              f.write(f"\n### Top 10 Leads\n\n")
              f.write("| Company | Phone | City | Website | Score |\n")
              f.write("|---------|-------|------|---------|-------|\n")
              for l in leads[:10]:
                  company = l.get("company", "")
                  phone   = l.get("phone", "")
                  city    = f"{l.get('city','')}, {l.get('state','')}"
                  website = l.get("website", "")
                  score   = l.get("lead_score", 0)
                  tier    = l.get("tier", "")
                  web_link = f"[link]({website})" if website else "-"
                  f.write(f"| {company} | {phone} | {city} | {web_link} | {score} ({tier}) |\n")
          PYEOF
          fi
