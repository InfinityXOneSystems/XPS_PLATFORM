name: 🎭 Playwright E2E Tests (Frontend + Backend)

# Runs Playwright tests against:
#   1. The built Vite frontend (served via vite preview)
#   2. The live Railway backend API
#
# Triggers on every PR/push that touches frontend code, or manually.

on:
  push:
    branches: [main, develop, staging, 'copilot/**']
    paths:
      - 'frontend/**'
      - '.github/workflows/playwright_e2e.yml'
  pull_request:
    paths:
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Frontend URL to test (default: built preview server)'
        required: false
        default: ''
      api_url:
        description: 'Backend API URL'
        required: false
        default: 'https://xpsintelligencesystem-production.up.railway.app'

permissions:
  contents: read
  pull-requests: write

env:
  RAILWAY_BACKEND: https://xpsintelligencesystem-production.up.railway.app

jobs:
  playwright:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        project: [chromium, mobile-chrome]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        env:
          VITE_API_URL: ${{ github.event.inputs.api_url || env.RAILWAY_BACKEND }}
          VITE_ENV: ci
        run: npm run build

      - name: Run Playwright tests (${{ matrix.project }})
        id: playwright
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:4173' }}
          VITE_API_URL: ${{ github.event.inputs.api_url || env.RAILWAY_BACKEND }}
        run: |
          npx playwright test \
            --project=${{ matrix.project }} \
            --reporter=github,html \
            2>&1
        continue-on-error: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}-${{ github.sha }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 14

      - name: Post test summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.playwright.outcome }}';
            const status = outcome === 'success' ? '✅ Passed' : '❌ Failed / Warnings';
            const lines = [
              `## 🎭 Playwright E2E — ${{ matrix.project }}`,
              '',
              `**Status:** ${status}`,
              `**Branch:** \`${{ github.ref_name }}\``,
              `**Project:** ${{ matrix.project }}`,
              '',
              `_Run at ${new Date().toISOString()}_`,
            ];
            core.summary.addRaw(lines.join('\n'));
            await core.summary.write();
