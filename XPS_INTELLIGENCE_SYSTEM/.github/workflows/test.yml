name: Test Backend

# GOVERNANCE: Tier 1 — Quality Gates
# Runs pytest on every push and pull request. Must pass before deploy.

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:
  workflow_call:
    outputs:
      result:
        description: "Test result (success/failure)"
        value: ${{ jobs.test.outputs.result }}

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (backend)
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.run-tests.outcome }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run tests
        id: run-tests
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-test-secret-key
          LOG_LEVEL: warning
        run: |
          cd backend
          pytest tests/ -v --tb=short -q \
            --cov=app --cov-report=xml --cov-report=term-missing
          EXIT=$?
          if [ $EXIT -eq 5 ]; then
            echo "[WARN] No tests collected — treating as pass"
            exit 0
          fi
          exit $EXIT

      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
