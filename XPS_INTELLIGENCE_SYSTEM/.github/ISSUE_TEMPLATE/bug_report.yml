name: 🐛 Bug Report
description: Report a bug or broken behavior in the platform
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Fill out the sections below and a Copilot agent will be automatically assigned to investigate and fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: When I run the scraper with city X, it returns 0 leads instead of ~50...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npm run score`
        2. Check data/leads/scored_leads.json
        3. ...
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Scraper / Lead Discovery
        - Validation Pipeline
        - Scoring Engine
        - Outreach Automation
        - Dashboard / UI
        - GitHub Actions Workflow
        - Database / API
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical — system is down
        - High — major feature broken
        - Medium — feature partially broken
        - Low — minor issue
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
