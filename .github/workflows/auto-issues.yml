name: XPS AUTO ISSUE ENGINE

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  create-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Create Issue
        run: |
          gh issue create \
            --title "AUTO: System Optimization Task" \
            --body "Generated by orchestrator" \
            --label "auto,task"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
