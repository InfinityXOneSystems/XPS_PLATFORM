name: XPS AUTO PR ENGINE

on:
  push:
    branches-ignore:
      - main

jobs:
  pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AUTO: system update"
          branch: auto/update
          title: "AUTO: System Update"
          body: "Generated by XPS orchestrator"
