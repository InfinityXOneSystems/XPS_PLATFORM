version: "3.9"

services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./XPS_INTELLIGENCE_SYSTEM
    container_name: xps_backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - redis
      - qdrant
      - ollama

  frontend:
    build: ./XPS-INTELLIGENCE-FRONTEND
    container_name: xps_frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    restart: unless-stopped
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  qdrant_data:
  ollama_models:
  n8n_data: